<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const AGENTS = [
  { id:'CEO', label:'ceo office', ring:'#E8C84A', border:'#E8C84A' },
  { id:'CTO', label:'cto office', ring:'#3B5EA6', border:'#3B5EA6' },
  { id:'CMO', label:'cmo office', ring:'#D93025', border:'#D93025' },
  { id:'COO', label:'coo office', ring:'#4A9B6A', border:'#4A9B6A' },
];

const AGENT_COLORS = { CEO:'#E8C84A', CTO:'#3B5EA6', CMO:'#D93025', COO:'#4A9B6A' };
const STATUSES = ['idle...','thinking...','talking...','working...','building...','marketing...'];

const DEMO_MSGS = [
  { agent:'CEO', round:'ROUND 1', text:'Welcome everyone. Today we define our product vision and key milestones for Q3.' },
  { agent:'CTO', round:'ROUND 1', text:'From the tech side, I suggest React Native with a Node.js backend. MVP in 6 weeks with expense tracking and budget alerts.' },
  { agent:'CMO', round:'ROUND 1', text:'The student market is underserved. University partnerships and TikTok campaigns can get us 10k users in month one.' },
  { agent:'COO', round:'ROUND 2', text:'Operations are mapped. We need 3 engineers, 1 designer. I will handle vendor contracts and infrastructure costs.' },
  { agent:'CEO', round:'CONFLICT', text:'I think we need to prioritize B2C over institutional partnerships. The viral loop is stronger with individual students.' },
  { agent:'CMO', round:'CONFLICT', text:'I disagree — university deals give us guaranteed distribution. Individual acquisition is expensive at this stage.' },
  { agent:'CTO', round:'AGREED', text:'We can build both pathways. The API supports institutional SSO and consumer sign-up. Ship and test both channels in parallel.' },
  { agent:'COO', round:'AGREED', text:'Agreed. I will coordinate both tracks. Requirements finalized. Proceeding to build phase.' },
];

// Pixel positions of agents (center of avatar) within the left panel (position:relative)
// Panel is ~663px wide, ~596px tall (620 - 24 padding). Inner content after 12px padding each side.
// Zones: zone1=28%, zone2=flex1, zone3=18% of ~580px usable height (gaps subtracted)
// zone1 ≈ 162px, gap 8, zone2 ≈ 298px, gap 8, zone3 ≈ 112px
// zone2 starts at: 12+162+8 = 182px from panel top
// left col: 19% of ~639 = 121px, center x = 12+60 = 72
// right col center x = 12+639-60 = 591
// In each office the avatar is centered vertically: top office center y = 182+149/2 = 182+74 = 256, bottom = 182+149+8+74 = 413

const OFFICE_POS = {
  CEO: { x: 72,  y: 250 },
  CTO: { x: 72,  y: 405 },
  CMO: { x: 591, y: 250 },
  COO: { x: 591, y: 405 },
};

// Board meeting room: 38% of 639 = ~243px wide, starts at x=12, room height=162px
// Oval table center: x=12+243/2=133, y=12+162*0.5-162*0.15 ≈ 80 (within panel coords: y=12+80=92)
// Agent spots around oval (panel-level coords):
const TABLE_POS = {
  CEO: { x: 130, y: 20  },   // top
  CTO: { x: 230, y: 82  },   // right
  CMO: { x: 130, y: 140 },   // bottom
  COO: { x: 30,  y: 82  },   // left
};

const ROUND_STYLE = {
  'ROUND 1': { bg:'#EEF2FF', color:'#4338CA', border:'#818CF8' },
  'ROUND 2': { bg:'#F0FDF4', color:'#166534', border:'#4ADE80' },
  'CONFLICT': { bg:'#FEF2F2', color:'#991B1B', border:'#FCA5A5' },
  'AGREED':   { bg:'#F0FDF4', color:'#14532D', border:'#86EFAC' },
};

function AvatarImg({ id, size=52, active=false, ring }) {
  return (
    <div style={{
      width:size, height:size, borderRadius:'50%',
      overflow:'hidden', background:'#fff', flexShrink:0,
      boxShadow: active ? `0 0 0 5px ${ring}88, 0 0 20px ${ring}55` : 'none',
      transition:'box-shadow 0.4s',
    }}>
      <img src={window.IMGS[id]} style={{width:'100%',height:'100%',objectFit:'cover'}} />
    </div>
  );
}

function Room({ label, labelPos='tl', children, style }) {
  const lp = {
    tl:  { position:'absolute', top:8, left:10, fontSize:11, fontWeight:600, color:'#333' },
    tc:  { position:'absolute', top:8, left:'50%', transform:'translateX(-50%)', fontSize:11, fontWeight:600, color:'#333' },
    c:   { position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', fontSize:13, fontWeight:600, color:'#aaa' },
  };
  return (
    <div style={{ position:'relative', background:'#fff', border:'2px solid #111', borderRadius:14, overflow:'visible', ...style }}>
      {label && <span style={lp[labelPos] || lp.tl}>{label}</span>}
      {children}
    </div>
  );
}

function ChatMessage({ msg, idx }) {
  const rs = ROUND_STYLE[msg.round] || ROUND_STYLE['ROUND 1'];
  const ac = AGENT_COLORS[msg.agent];
  const bg = msg.round==='CONFLICT' ? '#FFF5F5' : msg.round==='AGREED' ? '#F0FFF4' : '#FAFAFA';
  return (
    <div style={{ display:'flex', gap:10, padding:'10px 12px', borderRadius:12, background:bg,
      borderLeft:`4px solid ${ac}`, marginBottom:8, animation:'msgIn 0.35s ease' }}>
      <div style={{ width:34, height:34, borderRadius:'50%', overflow:'hidden', background:'#eee', flexShrink:0 }}>
        <img src={window.IMGS[msg.agent]} style={{width:'100%',height:'100%',objectFit:'cover'}} />
      </div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
          <span style={{fontWeight:800,fontSize:13,color:'#111'}}>{msg.agent}</span>
          <span style={{fontSize:10,fontWeight:700,padding:'2px 8px',borderRadius:20,
            background:rs.bg,color:rs.color,border:`1px solid ${rs.border}`}}>{msg.round}</span>
        </div>
        <p style={{fontSize:12.5,color:'#333',lineHeight:1.65}}>{msg.text}</p>
      </div>
    </div>
  );
}

function ScoreBar({ label, value }) {
  return (
    <div style={{marginBottom:11}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
        <span style={{fontSize:12,fontWeight:700,color:'#eee'}}>{label}</span>
        <span style={{fontSize:12,fontWeight:700,color:'#eee'}}>{Math.round(value*100)}%</span>
      </div>
      <div style={{height:10,background:'rgba(0,0,0,0.2)',borderRadius:20,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${value*100}%`,background:'#fff',borderRadius:20,transition:'width 1s ease'}} />
      </div>
    </div>
  );
}

function App() {
  const [tab, setTab]             = useState(0);
  const [simState, setSimState]   = useState('idle');
  // agentState per agent: 'office' | 'moving' | 'table'
  const [agentState, setAgentState] = useState({CEO:'office',CTO:'office',CMO:'office',COO:'office'});
  const [activeAgent, setActiveAgent] = useState(null);
  const [statuses, setStatuses]   = useState({CEO:'idle...',CTO:'idle...',CMO:'idle...',COO:'idle...'});
  const [messages, setMessages]   = useState([]);
  const [input, setInput]         = useState('');
  const [inputGlow, setInputGlow] = useState(false);
  const [scores, setScores]       = useState({Requirements:0,Product:0,Marketing:0,Conflicts:0,Efficiency:0});
  const [reward, setReward]       = useState(0);
  const [episode, setEpisode]     = useState({current:0,total:3,trend:0});
  const timerRef  = useRef(null);
  const chatRef   = useRef(null);

  useEffect(() => {
    if (chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight;
  }, [messages]);

  const clearSim = () => {
    clearTimeout(timerRef.current);
    setSimState('idle');
    setAgentState({CEO:'office',CTO:'office',CMO:'office',COO:'office'});
    setActiveAgent(null);
    setStatuses({CEO:'idle...',CTO:'idle...',CMO:'idle...',COO:'idle...'});
    setMessages([]); setInputGlow(false);
    setScores({Requirements:0,Product:0,Marketing:0,Conflicts:0,Efficiency:0});
    setReward(0); setEpisode({current:0,total:3,trend:0});
  };

  const moveAgentToTable = useCallback((id) => {
    // 1) Start moving
    setAgentState(prev => ({...prev, [id]:'moving'}));
    // 2) After transition finishes, mark arrived
    setTimeout(() => {
      setAgentState(prev => ({...prev, [id]:'table'}));
    }, 900);
  }, []);

  const runMsg = useCallback((idx, prevScores, prevReward, arrivedSet) => {
    if (idx >= DEMO_MSGS.length) {
      setSimState('done'); setActiveAgent(null);
      setStatuses({CEO:'working...',CTO:'building...',CMO:'marketing...',COO:'working...'});
      setInputGlow(false); return;
    }
    const msg = DEMO_MSGS[idx];
    setActiveAgent(msg.agent);
    setMessages(prev => [...prev, msg]);
    setStatuses(prev => ({...prev, [msg.agent]:'talking...'}));
    AGENTS.forEach(a => { if(a.id!==msg.agent) setStatuses(prev=>({...prev,[a.id]:idx%2===0?'thinking...':'working...'})); });

    // Move to table if not already there
    if (!arrivedSet.has(msg.agent)) {
      moveAgentToTable(msg.agent);
      arrivedSet = new Set([...arrivedSet, msg.agent]);
    }

    // Scores
    const ns = {};
    Object.keys(prevScores).forEach(k => ns[k] = Math.min(1, prevScores[k] + Math.random()*0.12+0.03));
    setScores(ns);
    const nr = +(prevReward + Math.random()*0.025+0.01).toFixed(3);
    setReward(nr);
    setEpisode(prev => ({...prev, current:Math.max(1,prev.current), trend:+(Math.random()*0.06+0.01).toFixed(3)}));

    if (idx===0) setTimeout(()=>setInputGlow(true), 1200);
    else setInputGlow(false);

    timerRef.current = setTimeout(() => runMsg(idx+1, ns, nr, arrivedSet), 3200);
  }, [moveAgentToTable]);

  const startMeeting = () => {
    clearSim();
    setTab(0);
    setTimeout(() => {
      setSimState('running');
      setEpisode({current:1,total:3,trend:0});
      runMsg(0, {Requirements:0,Product:0,Marketing:0,Conflicts:0,Efficiency:0}, 0, new Set());
    }, 60);
  };

  const handleSend = () => {
    if (!input.trim()) return;
    setMessages(prev => [...prev, {agent:'FOUNDER',round:'REPLY',text:input.trim()}]);
    setInput(''); setInputGlow(false);
  };

  const ORANGE = '#F5A623';

  // Flying agent: renders as absolute overlay on left panel
  // When 'moving': starts at office pos, transitions to table pos (CSS transition)
  // We use a tiny trick: render at table pos immediately but use transform to start from offset
  // Actually we use a ref-trick: render at office pos, then on next frame move to table pos

  function FlyingAgent({ id }) {
    const state = agentState[id];
    const ring  = AGENT_COLORS[id];
    const [pos, setPos] = useState(OFFICE_POS[id]);
    const [arrived, setArrived] = useState(false);

    useEffect(() => {
      if (state === 'moving') {
        // Start at office, next frame go to table
        setPos(OFFICE_POS[id]);
        setArrived(false);
        const raf = requestAnimationFrame(() => {
          setTimeout(() => {
            setPos(TABLE_POS[id]);
            setArrived(true);
          }, 30);
        });
        return () => cancelAnimationFrame(raf);
      } else if (state === 'office') {
        setPos(OFFICE_POS[id]);
        setArrived(false);
      } else if (state === 'table') {
        setPos(TABLE_POS[id]);
        setArrived(true);
      }
    }, [state, id]);

    if (state === 'office') return null; // shown inside office room itself
    if (state === 'table') return null;  // shown inside board room itself

    const size = 44;
    return (
      <div style={{
        position:'absolute',
        left: pos.x - size/2,
        top:  pos.y - size/2,
        width: size, height: size,
        borderRadius:'50%',
        overflow:'hidden',
        background:'#fff',
        zIndex:20,
        pointerEvents:'none',
        transition:'left 0.85s cubic-bezier(0.4,0,0.2,1), top 0.85s cubic-bezier(0.4,0,0.2,1)',
        boxShadow: `0 4px 20px rgba(0,0,0,0.25)`,
      }}>
        <img src={window.IMGS[id]} style={{width:'100%',height:'100%',objectFit:'cover'}} />
      </div>
    );
  }

  return (
    <div style={{display:'flex',gap:14,width:'min(1080px,calc(100vw - 40px))',height:620,alignItems:'stretch'}}>

      {/* ════ LEFT PANEL ════ */}
      <div style={{flex:'0 0 62%',background:'#FFF8F0',border:'2.5px solid #111',borderRadius:20,
        padding:12,display:'flex',flexDirection:'column',gap:8,position:'relative',overflow:'hidden'}}>

        {/* Flying agents overlay */}
        {AGENTS.map(a => <FlyingAgent key={a.id} id={a.id} />)}

        {/* ZONE 1 — top row */}
        <div style={{display:'flex',gap:8,flex:'0 0 28%'}}>
          {/* Board meeting room */}
          <Room label="board meeting room" style={{flex:'0 0 38%',position:'relative',overflow:'hidden'}}>
            {/* Oval table */}
            <div style={{position:'absolute',top:'52%',left:'50%',transform:'translate(-50%,-40%)',
              width:88,height:42,borderRadius:'50%',border:'2.5px solid #111',background:'transparent'}} />
            {/* Seated agents (only when state==='table') */}
            {AGENTS.map(a => {
              if (agentState[a.id] !== 'table') return null;
              const isActive = activeAgent === a.id;
              const seatStyle = {
                CEO: {top:28,  left:'50%', transform:'translateX(-50%)'},
                CTO: {top:'50%', right:36, transform:'translateY(-50%)'},
                CMO: {bottom:22, left:'50%', transform:'translateX(-50%)'},
                COO: {top:'50%', left:36,  transform:'translateY(-50%)'},
              }[a.id];
              return (
                <div key={a.id} style={{position:'absolute',zIndex:2,...seatStyle,animation:'seatIn 0.3s ease'}}>
                  <div style={{width:30,height:30,borderRadius:'50%',overflow:'hidden',background:'#fff',
                    boxShadow: isActive ? `0 0 0 3px ${a.ring}99` : '0 1px 4px rgba(0,0,0,0.15)',
                    transition:'box-shadow 0.3s'}}>
                    <img src={window.IMGS[a.id]} style={{width:'100%',height:'100%',objectFit:'cover'}} />
                  </div>
                </div>
              );
            })}
          </Room>
          {/* Narrow center */}
          <Room style={{flex:'0 0 14%',display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{width:26,height:48,borderRadius:20,border:'2px solid #ccc',background:'#f5f5f5'}} />
          </Room>
          {/* Play area */}
          <Room label="play area" labelPos="c" style={{flex:1}} />
        </div>

        {/* ZONE 2 — middle row */}
        <div style={{display:'flex',gap:8,flex:1}}>
          {/* Left offices */}
          <div style={{display:'flex',flexDirection:'column',gap:8,flex:'0 0 19%'}}>
            {[AGENTS[0], AGENTS[1]].map(a => (
              <Room key={a.id} label={a.label} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <div style={{marginTop:14}}>
                  {agentState[a.id] === 'office'
                    ? <AvatarImg id={a.id} ring={a.ring} size={50} active={activeAgent===a.id} />
                    : <div style={{width:50,height:50,borderRadius:'50%',border:`3px dashed ${a.ring}`,opacity:0.25,background:'#eee'}} />
                  }
                </div>
              </Room>
            ))}
          </div>
          {/* Hall */}
          <Room label="hall" labelPos="tc" style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginTop:16}}>
              {[0,1,2,3].map(i=>(
                <div key={i} style={{width:66,height:28,borderRadius:20,border:'2px solid #bbb',background:'#f0f0f0'}} />
              ))}
            </div>
          </Room>
          {/* Right offices */}
          <div style={{display:'flex',flexDirection:'column',gap:8,flex:'0 0 19%'}}>
            {[AGENTS[2], AGENTS[3]].map(a => (
              <Room key={a.id} label={a.label} style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center'}}>
                <div style={{marginTop:14}}>
                  {agentState[a.id] === 'office'
                    ? <AvatarImg id={a.id} ring={a.ring} size={50} active={activeAgent===a.id} />
                    : <div style={{width:50,height:50,borderRadius:'50%',border:`3px dashed ${a.ring}`,opacity:0.25,background:'#eee'}} />
                  }
                </div>
              </Room>
            ))}
          </div>
        </div>

        {/* ZONE 3 — status strip */}
        <div style={{display:'flex',gap:8,flex:'0 0 18%'}}>
          {AGENTS.map(a => (
            <div key={a.id} style={{flex:1,border:`2.5px solid ${a.ring}`,borderRadius:12,background:'#fff',
              display:'flex',alignItems:'center',gap:8,padding:'4px 10px'}}>
              <AvatarImg id={a.id} ring={a.ring} size={44} active={activeAgent===a.id} />
              <span style={{fontSize:11,color:'#555',fontWeight:600,
                animation:statuses[a.id]!=='idle...'?'statusBlink 1.5s infinite':'none'}}>
                {statuses[a.id]}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* ════ RIGHT PANEL ════ */}
      <div style={{flex:1,background:ORANGE,border:'2.5px solid #111',borderRadius:20,
        display:'flex',flexDirection:'column',padding:12,gap:10,overflow:'hidden'}}>

        {/* Tabs */}
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          {['Board Meeting','1-on-1 Chat','📊 Scores'].map((t,i)=>(
            <button key={i} onClick={()=>setTab(i)} style={{
              flex:1,padding:'8px 0',borderRadius:30,border:'2px solid #111',
              background:tab===i?'#fff':'rgba(255,255,255,0.25)',
              color:tab===i?'#111':'#fff',fontWeight:700,fontSize:12,cursor:'pointer',
              transition:'all 0.2s',
            }}>{t}</button>
          ))}
        </div>

        {/* Fixed-height content area — never resizes */}
        <div style={{flex:1,minHeight:0,display:'flex',flexDirection:'column',gap:8}}>

          {/* Tab 0 — Board Meeting */}
          {tab===0 && (<>
            <div style={{flexShrink:0}}>
              {simState==='idle' && (
                <button onClick={startMeeting} style={{width:'100%',background:'#fff',border:'2px solid #111',
                  borderRadius:10,padding:'8px 16px',fontWeight:800,fontSize:12,cursor:'pointer'}}>
                  ▶ Start Board Meeting
                </button>
              )}
              {simState==='running' && (
                <button onClick={clearSim} style={{width:'100%',background:'rgba(255,255,255,0.25)',
                  border:'2px solid #fff',borderRadius:10,padding:'8px 16px',fontWeight:800,fontSize:12,
                  cursor:'pointer',color:'#fff'}}>
                  ■ Stop Simulation
                </button>
              )}
            </div>
            <div ref={chatRef} style={{flex:1,minHeight:0,background:'#FFF5E4',borderRadius:12,
              padding:10,overflowY:'auto'}}>
              {messages.length===0 && (
                <div style={{color:'#bbb',fontSize:12,textAlign:'center',marginTop:40,fontStyle:'italic'}}>
                  Click Start Board Meeting to begin…
                </div>
              )}
              {messages.map((m,i)=>(
                m.agent==='FOUNDER'
                ? <div key={i} style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
                    <div style={{background:'#F5A623',borderRadius:12,padding:'8px 12px',maxWidth:'75%',
                      fontSize:12,color:'#fff',fontWeight:600,border:'2px solid #111'}}>
                      <div style={{fontSize:10,fontWeight:800,marginBottom:2}}>FOUNDER</div>
                      {m.text}
                    </div>
                  </div>
                : <ChatMessage key={i} msg={m} idx={i} />
              ))}
            </div>
          </>)}

          {/* Tab 1 — 1-on-1 Chat */}
          {tab===1 && (
            <div style={{flex:1,minHeight:0,background:'#FFF5E4',borderRadius:12,padding:10,
              overflowY:'auto',display:'flex',flexDirection:'column'}}>
              <div style={{textAlign:'center',color:'#bbb',fontSize:12,fontStyle:'italic',marginTop:40}}>
                Select an agent to chat with…
              </div>
              <div style={{display:'flex',gap:8,marginTop:'auto'}}>
                {AGENTS.map(a=>(
                  <button key={a.id} style={{flex:1,background:'#fff',border:`2px solid ${a.ring}`,
                    borderRadius:10,padding:6,cursor:'pointer',fontWeight:700,fontSize:11,color:'#333'}}>
                    {a.id}
                  </button>
                ))}
              </div>
            </div>
          )}

          {/* Tab 2 — Scores */}
          {tab===2 && (
            <div style={{flex:1,minHeight:0,overflowY:'auto',padding:'4px 0'}}>
              {episode.current===0
                ? <div style={{textAlign:'center',color:'rgba(255,255,255,0.7)',fontSize:12,fontStyle:'italic',marginTop:40}}>
                    Run a simulation to see scores…
                  </div>
                : <>
                    <div style={{textAlign:'center',marginBottom:14}}>
                      <div style={{fontSize:38,fontWeight:900,color:'#fff',fontFamily:'Arial Black,Arial'}}>{reward.toFixed(3)}</div>
                      <div style={{fontSize:10,color:'rgba(255,255,255,0.7)',fontWeight:700,letterSpacing:1}}>EPISODE REWARD</div>
                      <div style={{fontSize:12,color:'#fff',fontWeight:700,marginTop:2}}>
                        Episode {episode.current}/{episode.total}
                        {episode.trend>0 && <span style={{marginLeft:8,color:'#d4efdf'}}>↑ +{episode.trend.toFixed(3)}</span>}
                      </div>
                    </div>
                    {Object.entries(scores).map(([k,v])=><ScoreBar key={k} label={k} value={v} />)}
                    <button onClick={startMeeting} style={{width:'100%',marginTop:10,background:'#fff',
                      border:'2px solid #111',borderRadius:10,padding:'8px 0',fontWeight:800,fontSize:12,cursor:'pointer'}}>
                      ▶ Run New Episode
                    </button>
                  </>
              }
            </div>
          )}

        </div>

        {/* Input bar */}
        <div style={{display:'flex',gap:8,flexShrink:0,background:'rgba(255,255,255,0.15)',
          borderRadius:30,padding:'6px 8px',
          border:inputGlow?'2.5px solid #fff':'2px solid transparent',
          boxShadow:inputGlow?'0 0 12px rgba(255,255,255,0.5)':'none',
          transition:'border-color 0.3s,box-shadow 0.3s'}}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&handleSend()}
            placeholder="Answer agent questions or send a message..."
            style={{flex:1,background:'#fff',border:'none',borderRadius:24,
              padding:'8px 14px',fontSize:12,outline:'none',color:'#333'}} />
          <button onClick={handleSend} style={{background:'rgba(255,255,255,0.9)',border:'2px solid #111',
            borderRadius:24,padding:'7px 16px',fontWeight:800,fontSize:12,cursor:'pointer',color:'#111'}}>
            Send
          </button>
        </div>
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
